<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推箱子游戏</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        #game-container {
            display: grid;
            grid-template-columns: repeat(5, 50px);
            grid-template-rows: repeat(5, 50px);
            gap: 1px;
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid #ccc;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script>
        const gridWidth = 5;
        const gridHeight = 5;
        let playerPosition = { x: 1, y: 1 };
        let boxes = [{ x: 3, y: 3 }, { x: 2, y: 2 }]; // Added two boxes
        let targets = [{ x: 4, y: 4 }, { x: 0, y: 1 }]; // Added two targets
        let walls = [{ x: 0, y: 2 }, { x: 2, y: 0 }, { x: 4, y: 2 }, { x: 2, y: 4 }]; // Added walls
        let gameHistory = []; // Added game history array

        function renderGame() {
            const gameContainer = document.getElementById('game-container');
            gameContainer.innerHTML = '';
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (x === playerPosition.x && y === playerPosition.y) {
                        cell.textContent = '🧑';
                    } else if (boxes.some(box => box.x === x && box.y === y)) {
                        cell.textContent = '📦';
                    } else if (targets.some(target => target.x === x && target.y === y)) {
                        cell.textContent = '🎯';
                    } else if (walls.some(wall => wall.x === x && wall.y === y)) {
                        cell.style.backgroundColor = '#999';
                    }
                    gameContainer.appendChild(cell);
                }
            }
        }

        function movePlayer(dx, dy) {
            const newPosition = { x: playerPosition.x + dx, y: playerPosition.y + dy };
            if (!isWall(newPosition) && !isBox(newPosition)) {
                playerPosition = newPosition;
            } else if (isBox(newPosition)) {
                const newBoxPosition = { x: newPosition.x + dx, y: newPosition.y + dy };
                if (!isWall(newBoxPosition) && !isBox(newBoxPosition)) {
                    const boxIndex = boxes.findIndex(box => box.x === newPosition.x && box.y === newPosition.y);
                    boxes[boxIndex] = newBoxPosition;
                    playerPosition = newPosition;
                }
            }
            renderGame();
            checkWin();
        }

        function isWall(position) {
            return (
                position.x < 0 ||
                position.x >= gridWidth ||
                position.y < 0 ||
                position.y >= gridHeight ||
                walls.some(wall => wall.x === position.x && wall.y === position.y)
            );
        }

        function isBox(position) {
            return boxes.some(box => box.x === position.x && box.y === position.y);
        }

        function checkWin() {
            const hasWon = boxes.every(box => targets.some(target => target.x === box.x && target.y === box.y));
            if (hasWon) {
                alert('恭喜你，胜利！');
            }
        }

        document.addEventListener('keydown', event => {
            switch (event.key) {
                case 'ArrowUp':
                case 'w':
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                    movePlayer(1, 0);
                    break;
                case 'z': // Added undo functionality on 'z' key press
                    undoMove();
                    break;
                case 'r': // Added reset functionality on 'r' key press
                    resetGame();
                    break;
            }
        });

        function undoMove() {
            if (gameHistory.length > 0) {
                const previousMove = gameHistory.pop();
                playerPosition = previousMove.playerPosition;
                boxes = previousMove.boxes;
                renderGame();
            }
        }

        function resetGame() {
            playerPosition = { x: 1, y: 1 };
            boxes = [{ x: 3, y: 3 }, { x: 2, y: 2 }];
            renderGame();
        }

        renderGame();
    </script>
    <p style="position: absolute; bottom: 30px;">上左右或adw移动和跳跃, 不要碰地板哟</p>
</body>

</html>
